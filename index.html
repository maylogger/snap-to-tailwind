<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>拍照抽色 → 背景 + 4 前景色 → Tailwind 50–950</title>
    <style>
        :root {
            color-scheme: light;
        }

        body {
            font-family: system-ui, -apple-system, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            background: #f6f7f8;
            color: #111;
        }

        .wrap {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        h1 {
            font-size: 18px;
            margin: 0 0 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 880px) {
            .grid {
                grid-template-columns: 1.2fr 0.8fr;
            }
        }

        .card {}

        .row {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
            align-items: center;
        }

        .btn {
            border: 1px solid #d1d5db;
            background: #fff;
            border-radius: 10px;
            padding: 10px 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .muted {
            color: #6b7280;
            font-size: 12px;
            line-height: 1.4;
        }

        .swatches {
            display: grid;
            grid-template-columns: repeat(11, minmax(0, 1fr));
            gap: 0px;
        }

        .chip {
            border: 1px solid rgba(0, 0, 0, .08);
            height: 28px;
            box-sizing: border-box;
        }

        /* 產生出來的五個顏色在 swatches 裡對應的那一格用粗框標示 */
        .chip.chip--anchor {
            border-width: 2px;
            border-color: #333;
            position: relative;
        }

        /* 粗框格內顯示打勾 */
        .chip__check {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .chip__check svg {
            width: 14px;
            height: 14px;
            filter: drop-shadow(0 0 1px rgba(0, 0, 0, .5)) drop-shadow(0 1px 1px rgba(0, 0, 0, .3));
        }

        .chip__check path {
            fill: #fff;
        }

        textarea {
            width: 100%;
            min-height: 220px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            padding: 10px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 12px;
        }

        canvas {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            background: #fff;
        }

        .pill {
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            font-size: 12px;
            background: #fff;
            min-height: 50px;
            flex: 1;
            display: flex;
            align-items: end;
            justify-content: end;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="grid">
            <div class="card">
                <canvas id="cvs" width="1" height="1"></canvas>
                <div class="row">
                    <input id="file" type="file" accept="image/*" capture="environment" class="btn" />
                    <button id="analyze" class="btn">分析</button>
                    <span id="status" class="muted">請先拍照或上傳圖片。</span>
                </div>


            </div>

            <div class="card">
                <div class="row">
                    <span class="pill" id="pillBg"><span id="bgHex">—</span></span>
                    <span class="pill" id="pillFg1"><span id="fg1Hex">—</span></span>
                    <span class="pill" id="pillFg2"><span id="fg2Hex">—</span></span>
                    <span class="pill" id="pillFg3"><span id="fg3Hex">—</span></span>
                    <span class="pill" id="pillFg4"><span id="fg4Hex">—</span></span>
                </div>

                <div style="height:10px"></div>
                <div id="preview" class="preview">

                    <div class="muted" style="font-weight:700;margin-bottom:6px;">bg</div>
                    <div id="swBg" class="swatches"></div>
                    <div style="height:10px"></div>

                    <div class="muted" style="font-weight:700;margin-bottom:6px;">fg1</div>
                    <div id="swFg1" class="swatches"></div>
                    <div style="height:10px"></div>

                    <div class="muted" style="font-weight:700;margin-bottom:6px;">fg2</div>
                    <div id="swFg2" class="swatches"></div>
                    <div style="height:10px"></div>

                    <div class="muted" style="font-weight:700;margin-bottom:6px;">fg3</div>
                    <div id="swFg3" class="swatches"></div>
                    <div style="height:10px"></div>

                    <div class="muted" style="font-weight:700;margin-bottom:6px;">fg4</div>
                    <div id="swFg4" class="swatches"></div>
                </div>

                <div style="height:12px"></div>
                <div class="row">
                    <button id="copyJson" class="btn">複製 Tailwind JSON</button>
                    <button id="copyCss" class="btn">複製 CSS 變數</button>
                </div>
                <div style="height:10px"></div>
                <textarea id="out" readonly></textarea>
            </div>
        </div>
    </div>

    <!-- 與 ref 一致：用 chroma-js（npm）算 value（HSL L / luminance） -->
    <script src="vendor/chroma.js"></script>
    <script src="shade-mapper.js"></script>
    <script>
        /* =========================
           小工具：sRGB <-> OKLab/OKLCH
           參考 OKLab 標準矩陣（前端可用）
        ========================= */
        function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }
        function srgbToLinear(u) {
            u = u / 255;
            return (u <= 0.04045) ? (u / 12.92) : Math.pow((u + 0.055) / 1.055, 2.4);
        }
        function linearToSrgb(u) {
            u = (u <= 0.0031308) ? (12.92 * u) : (1.055 * Math.pow(u, 1 / 2.4) - 0.055);
            return clamp(Math.round(u * 255), 0, 255);
        }
        function rgbToOklab([r, g, b]) {
            const R = srgbToLinear(r), G = srgbToLinear(g), B = srgbToLinear(b);
            // linear RGB -> LMS
            const l = 0.4122214708 * R + 0.5363325363 * G + 0.0514459929 * B;
            const m = 0.2119034982 * R + 0.6806995451 * G + 0.1073969566 * B;
            const s = 0.0883024619 * R + 0.2817188376 * G + 0.6299787005 * B;
            const l_ = Math.cbrt(l), m_ = Math.cbrt(m), s_ = Math.cbrt(s);
            const L = 0.2104542553 * l_ + 0.7936177850 * m_ - 0.0040720468 * s_;
            const a = 1.9779984951 * l_ - 2.4285922050 * m_ + 0.4505937099 * s_;
            const b2 = 0.0259040371 * l_ + 0.7827717662 * m_ - 0.8086757660 * s_;
            return [L, a, b2];
        }
        function oklabToRgb([L, a, b]) {
            // OKLab -> LMS'
            const l_ = L + 0.3963377774 * a + 0.2158037573 * b;
            const m_ = L - 0.1055613458 * a - 0.0638541728 * b;
            const s_ = L - 0.0894841775 * a - 1.2914855480 * b;
            const l = l_ * l_ * l_;
            const m = m_ * m_ * m_;
            const s = s_ * s_ * s_;
            // LMS -> linear RGB
            const R = 4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s;
            const G = -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s;
            const B = -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s;
            return [linearToSrgb(R), linearToSrgb(G), linearToSrgb(B)];
        }
        function oklabToOklch([L, a, b]) {
            const C = Math.sqrt(a * a + b * b);
            let h = Math.atan2(b, a) * 180 / Math.PI;
            if (h < 0) h += 360;
            return [L, C, h];
        }
        function oklchToOklab([L, C, h]) {
            const hr = h * Math.PI / 180;
            const a = C * Math.cos(hr);
            const b = C * Math.sin(hr);
            return [L, a, b];
        }
        function rgbToHex([r, g, b]) {
            const to2 = v => v.toString(16).padStart(2, "0");
            return ("#" + to2(r) + to2(g) + to2(b)).toUpperCase();
        }
        function hexToRgb(hex) {
            const s = hex.replace("#", "").trim();
            const v = (s.length === 3) ? s.split("").map(c => c + c).join("") : s;
            return [parseInt(v.slice(0, 2), 16), parseInt(v.slice(2, 4), 16), parseInt(v.slice(4, 6), 16)];
        }
        function deltaE_oklab(rgb1, rgb2) {
            const [L1, a1, b1] = rgbToOklab(rgb1);
            const [L2, a2, b2] = rgbToOklab(rgb2);
            const dL = L1 - L2, da = a1 - a2, db = b1 - b2;
            return Math.sqrt(dL * dL + da * da + db * db);
        }

        /* =========================
           WCAG 對比度（相對亮度）
        ========================= */
        function relLuminance([r, g, b]) {
            const R = srgbToLinear(r), G = srgbToLinear(g), B = srgbToLinear(b);
            return 0.2126 * R + 0.7152 * G + 0.0722 * B;
        }
        function contrastRatio(rgbA, rgbB) {
            const LA = relLuminance(rgbA), LB = relLuminance(rgbB);
            const L1 = Math.max(LA, LB), L2 = Math.min(LA, LB);
            return (L1 + 0.05) / (L2 + 0.05);
        }

        function inGamutRgb([r, g, b]) {
            return r >= 0 && r <= 255 && g >= 0 && g <= 255 && b >= 0 && b <= 255;
        }
        function oklchToRgbGamutMapped(L, C, h) {
            let c = C;
            for (let i = 0; i < 32; i++) {
                const rgb = oklabToRgb(oklchToOklab([L, c, h]));
                if (inGamutRgb(rgb)) return rgb;
                c *= 0.95;
            }
            return oklabToRgb(oklchToOklab([L, 0, h]));
        }

        /* =========================
           取樣 + K-means（輕量）
        ========================= */
        function samplePixels(ctx, w, h, opts) {
            const { sx = 0, sy = 0, sw = w, sh = h, step = 4, max = 12000 } = opts || {};
            const img = ctx.getImageData(sx, sy, sw, sh).data;
            const out = [];
            const stride = sw * 4;
            for (let y = 0; y < sh; y += step) {
                const row = y * stride;
                for (let x = 0; x < sw; x += step) {
                    const i = row + x * 4;
                    const a = img[i + 3];
                    if (a < 200) continue; // 略過透明
                    out.push([img[i], img[i + 1], img[i + 2]]);
                    if (out.length >= max) return out;
                }
            }
            return out;
        }

        function kmeans(pixels, k = 10, iters = 10) {
            if (!pixels.length) throw new Error("沒有可用像素");
            // 初始化中心：隨機取樣
            const centers = [];
            for (let i = 0; i < k; i++) {
                centers.push(pixels[(Math.random() * pixels.length) | 0].slice());
            }
            let assigns = new Array(pixels.length).fill(0);

            for (let t = 0; t < iters; t++) {
                // 指派
                for (let i = 0; i < pixels.length; i++) {
                    const p = pixels[i];
                    let best = 0, bestD = 1e18;
                    for (let c = 0; c < k; c++) {
                        const cc = centers[c];
                        const dr = p[0] - cc[0], dg = p[1] - cc[1], db = p[2] - cc[2];
                        const d = dr * dr + dg * dg + db * db;
                        if (d < bestD) { bestD = d; best = c; }
                    }
                    assigns[i] = best;
                }
                // 更新中心
                const sum = Array.from({ length: k }, () => [0, 0, 0, 0]);
                for (let i = 0; i < pixels.length; i++) {
                    const a = assigns[i];
                    const p = pixels[i];
                    sum[a][0] += p[0]; sum[a][1] += p[1]; sum[a][2] += p[2]; sum[a][3] += 1;
                }
                for (let c = 0; c < k; c++) {
                    if (sum[c][3] === 0) continue;
                    centers[c] = [
                        Math.round(sum[c][0] / sum[c][3]),
                        Math.round(sum[c][1] / sum[c][3]),
                        Math.round(sum[c][2] / sum[c][3])
                    ];
                }
            }

            // 計數
            const counts = new Array(k).fill(0);
            for (const a of assigns) counts[a]++;

            // 回傳 clusters
            const clusters = centers.map((rgb, i) => ({ rgb, count: counts[i] }))
                .filter(x => x.count > 0)
                .sort((a, b) => b.count - a.count);
            return clusters;
        }

        /* =========================
           產 Tailwind 50–950：先算 valueStop，再以 valueStop 為錨點 createSwatches
           依 ref/helpers.ts calculateStopFromColor（Auto/Perceived 用 luminance*100）
        ========================= */
        const STOPS = ShadeMapper.STOPS;

        function makePaletteFromHex(baseHex, colorMode) {
            colorMode = colorMode || "perceived";
            const valueStop = ShadeMapper.getShadeForColor(baseHex, colorMode);
            const swatches = ShadeMapper.createSwatches({
                value: baseHex,
                valueStop: valueStop,
            });
            const out = {};
            for (let i = 0; i < swatches.length; i++) {
                const s = swatches[i];
                if (s.stop !== 0 && s.stop !== 1000) out[s.stop] = s.hex;
            }
            return { palette: out, anchorStop: valueStop };
        }

        /* =========================
           從照片挑 bg / fg1～fg4（依對比排行）
        ========================= */
        function pickBgFromBorder(ctx, w, h) {
            const m = Math.round(Math.min(w, h) * 0.08); // 邊框厚度 8%
            const step = 3;

            const top = samplePixels(ctx, w, h, { sx: 0, sy: 0, sw: w, sh: m, step, max: 6000 });
            const bot = samplePixels(ctx, w, h, { sx: 0, sy: h - m, sw: w, sh: m, step, max: 6000 });
            const lef = samplePixels(ctx, w, h, { sx: 0, sy: 0, sw: m, sh: h, step, max: 6000 });
            const rig = samplePixels(ctx, w, h, { sx: w - m, sy: 0, sw: m, sh: h, step, max: 6000 });
            const border = top.concat(bot, lef, rig);

            const clusters = kmeans(border, 6, 8);
            return clusters[0].rgb;
        }

        function pickFgColors(ctx, w, h, bgRgb) {
            const pixels = samplePixels(ctx, w, h, { sx: 0, sy: 0, sw: w, sh: h, step: 4, max: 16000 });
            const clusters = kmeans(pixels, 14, 10);
            const totalCount = clusters.reduce((s, c) => s + c.count, 0);

            // 複合評分：√對比 × (1 + 鮮豔大面積加成 + 高對比大面積加成)
            const scored = clusters.map(c => {
                const contrast = contrastRatio(c.rgb, bgRgb);
                const [, chroma] = oklabToOklch(rgbToOklab(c.rgb)); // OKLCH C 彩度，約 0~0.35
                const coverage = c.count / totalCount;               // 像素面積佔比 0~1

                // 鮮豔大面積加成：高彩度 + 佔較大面積，上限 4×3=12 倍
                const chromaBoost = Math.min(Math.pow(chroma / 0.08, 1.5), 4);
                const coverageBoost = Math.min(coverage / 0.08, 3);
                // 高對比大面積加成：對比高且佔圖 > 5% 也額外加分，上限 3 倍
                const contrastCoverageBoost = coverage > 0.01
                    ? Math.min((contrast - 1) / 4, 3)
                    : 0;
                // 複合分數
                const score = Math.sqrt(contrast) * (1 + chromaBoost * coverageBoost + contrastCoverageBoost);

                return { rgb: c.rgb, count: c.count, contrast, chroma, coverage, score };
            }).sort((a, b) => b.score - a.score);

            const fgList = [];
            // 設計工具不強制 WCAG，放寬門檻讓鮮豔色也能進入結果
            const minContrast = [1.5, 1.3, 1.2, 1.1];
            const dEThreshold = 0.06; // 與已選前景色需有感知差異

            for (let i = 0; i < 4; i++) {
                const threshold = minContrast[i];
                let picked = null;
                for (const s of scored) {
                    const okContrast = s.contrast >= threshold;
                    const okDist = fgList.every(prev => deltaE_oklab(s.rgb, prev) >= dEThreshold);
                    if (okContrast && okDist) {
                        picked = s.rgb;
                        break;
                    }
                }
                fgList.push(picked || (scored[i]?.rgb || (fgList[fgList.length - 1] || [255, 255, 255])));
            }

            const [fg1, fg2, fg3, fg4] = fgList;
            return { fg1, fg2, fg3, fg4 };
        }

        /** 依對比選出該色 100 或 900 作為 pill 內文字色 */
        function textColorForPalette(baseRgb, palette) {
            const r100 = hexToRgb(palette[100]);
            const r900 = hexToRgb(palette[900]);
            return contrastRatio(r100, baseRgb) >= contrastRatio(r900, baseRgb)
                ? palette[100]
                : palette[900];
        }

        /* =========================
           UI 綁定
        ========================= */
        const fileEl = document.getElementById("file");
        const analyzeBtn = document.getElementById("analyze");
        const cvs = document.getElementById("cvs");
        const statusEl = document.getElementById("status");
        const outEl = document.getElementById("out");
        const bgHexEl = document.getElementById("bgHex");
        const fg1HexEl = document.getElementById("fg1Hex");
        const fg2HexEl = document.getElementById("fg2Hex");
        const fg3HexEl = document.getElementById("fg3Hex");
        const fg4HexEl = document.getElementById("fg4Hex");
        const pillBg = document.getElementById("pillBg");
        const pillFg1 = document.getElementById("pillFg1");
        const pillFg2 = document.getElementById("pillFg2");
        const pillFg3 = document.getElementById("pillFg3");
        const pillFg4 = document.getElementById("pillFg4");

        const swBg = document.getElementById("swBg");
        const swFg1 = document.getElementById("swFg1");
        const swFg2 = document.getElementById("swFg2");
        const swFg3 = document.getElementById("swFg3");
        const swFg4 = document.getElementById("swFg4");

        let currentImg = null;

        async function runAnalysis() {
            if (!currentImg) {
                statusEl.textContent = "尚未選圖。";
                return;
            }
            try {
                statusEl.textContent = "分析中…";
                const ctx = cvs.getContext("2d", { willReadFrequently: true });
                const w = cvs.width, h = cvs.height;

                const bg = pickBgFromBorder(ctx, w, h);
                const { fg1, fg2, fg3, fg4 } = pickFgColors(ctx, w, h, bg);

                const bgHex = rgbToHex(bg);
                const fg1Hex = rgbToHex(fg1);
                const fg2Hex = rgbToHex(fg2);
                const fg3Hex = rgbToHex(fg3);
                const fg4Hex = rgbToHex(fg4);

                const { palette: palBg, anchorStop: anchorBg } = makePaletteFromHex(bgHex);
                const { palette: palFg1, anchorStop: anchorFg1 } = makePaletteFromHex(fg1Hex);
                const { palette: palFg2, anchorStop: anchorFg2 } = makePaletteFromHex(fg2Hex);
                const { palette: palFg3, anchorStop: anchorFg3 } = makePaletteFromHex(fg3Hex);
                const { palette: palFg4, anchorStop: anchorFg4 } = makePaletteFromHex(fg4Hex);

                bgHexEl.textContent = bgHex;
                fg1HexEl.textContent = fg1Hex;
                fg2HexEl.textContent = fg2Hex;
                fg3HexEl.textContent = fg3Hex;
                fg4HexEl.textContent = fg4Hex;

                [pillBg, pillFg1, pillFg2, pillFg3, pillFg4].forEach((el, i) => {
                    const baseRgb = [bg, fg1, fg2, fg3, fg4][i];
                    const palette = [palBg, palFg1, palFg2, palFg3, palFg4][i];
                    const baseHex = [bgHex, fg1Hex, fg2Hex, fg3Hex, fg4Hex][i];
                    el.style.background = baseHex;
                    el.style.color = textColorForPalette(baseRgb, palette);
                    el.style.borderColor = "rgba(0,0,0,0.12)";
                });

                renderSwatches(swBg, palBg, anchorBg);
                renderSwatches(swFg1, palFg1, anchorFg1);
                renderSwatches(swFg2, palFg2, anchorFg2);
                renderSwatches(swFg3, palFg3, anchorFg3);
                renderSwatches(swFg4, palFg4, anchorFg4);

                const tw = {
                    theme: {
                        extend: {
                            colors: {
                                photoBg: palBg,
                                photoFg: palFg1,
                                photoFg2: palFg2,
                                photoFg3: palFg3,
                                photoFg4: palFg4
                            }
                        }
                    }
                };

                const cssVars = [
                    ":root {",
                    ...STOPS.map(s => `  --photo-bg-${s}: ${palBg[s]};`),
                    ...STOPS.map(s => `  --photo-fg-${s}: ${palFg1[s]};`),
                    ...STOPS.map(s => `  --photo-fg2-${s}: ${palFg2[s]};`),
                    ...STOPS.map(s => `  --photo-fg3-${s}: ${palFg3[s]};`),
                    ...STOPS.map(s => `  --photo-fg4-${s}: ${palFg4[s]};`),
                    "}"
                ].join("\n");

                outEl.value =
                    "// Tailwind config\n" +
                    JSON.stringify(tw, null, 2) +
                    "\n\n// CSS Variables\n" +
                    cssVars;

                statusEl.textContent = "完成。";
            } catch (e) {
                console.error(e);
                statusEl.textContent = "分析失敗：" + (e && e.message ? e.message : String(e));
            }
        }

        fileEl.addEventListener("change", async () => {
            const f = fileEl.files && fileEl.files[0];
            if (!f) return;
            statusEl.textContent = "載入圖片中…";
            currentImg = await fileToImage(f);
            drawToCanvas(currentImg, cvs, 420); // 縮圖上限
            await runAnalysis(); // 拍照/上傳後自動分析
        });

        analyzeBtn.addEventListener("click", () => runAnalysis());

        document.getElementById("copyJson").addEventListener("click", async () => {
            const txt = window.__EXPORT_JSON__ || "";
            if (!txt) return;
            await navigator.clipboard.writeText(txt);
            statusEl.textContent = "已複製 Tailwind JSON。";
        });
        document.getElementById("copyCss").addEventListener("click", async () => {
            const txt = window.__EXPORT_CSS__ || "";
            if (!txt) return;
            await navigator.clipboard.writeText(txt);
            statusEl.textContent = "已複製 CSS 變數。";
        });

        function renderSwatches(root, palette, anchorStop) {
            root.innerHTML = "";
            for (const stop of STOPS) {
                const hex = palette[stop];
                const [L, C, h] = oklabToOklch(rgbToOklab(hexToRgb(hex)));
                const oklchStr = `oklch(${(L).toFixed(3)} ${(C).toFixed(3)} ${(h).toFixed(0)})`;
                const div = document.createElement("div");
                div.className = "chip" + (stop === anchorStop ? " chip--anchor" : "");
                div.style.background = hex;
                div.title = `${stop}: ${hex} · ${oklchStr}`;
                if (stop === anchorStop) {
                    const check = document.createElement("span");
                    check.className = "chip__check";
                    check.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                    div.appendChild(check);
                }
                root.appendChild(div);
            }
        }

        function fileToImage(file) {
            return new Promise((resolve, reject) => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
                img.onerror = reject;
                img.src = url;
            });
        }

        function drawToCanvas(img, canvas, maxW) {
            const ratio = img.width / img.height;
            const w = Math.min(maxW, img.width);
            const h = Math.round(w / ratio);
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);
        }
    </script>
</body>
